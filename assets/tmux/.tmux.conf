# ===== tmux 配置 =====
# 配合 Ghostty Niji 主题

# --- 基础设置 ---
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# --- Prefix 键 ---
# Ctrl+a 替代默认 Ctrl+b（更顺手）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Session 管理 ---
bind S command-prompt -p "new session:" "new-session -s '%%'"
bind K confirm-before -p "kill session #S? (y/n)" kill-session
bind s choose-tree -sZ
bind f command-prompt -p "find session:" "switch-client -t '%%'"

# --- 窗口 ---
bind c new-window -c "#{pane_current_path}"
bind r command-prompt -p "rename window:" "rename-window '%%'"
bind R command-prompt -p "rename session:" "rename-session '%%'"

# --- 分屏（与 Ghostty 一致的逻辑）---
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"
bind x confirm-before -p "kill pane? (y/n)" kill-pane

# --- Vi 模式导航（hjkl）---
setw -g mode-keys vi
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# 调整 pane 大小
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

# --- 复制模式（Vi 风格）---
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# --- 快捷操作 ---
bind g new-window -n "lazygit" "lazygit"
bind C new-window -n "claude" "claude"
bind b new-window -n "btop" "btop"
bind m new-window -n "glow" "glow"

# --- 状态栏（Niji 风格）---
set -g status-position bottom
set -g status-style "bg=#1b1b2f,fg=#c0c0c0"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#7aa2f7,bold] #S #[default]│ "
set -g status-right "#[fg=#bb9af7]%H:%M #[fg=#555555]│ #[fg=#7aa2f7]#h"
set -g window-status-format "#[fg=#555555] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1b1b2f,fg=#7aa2f7"

# --- 重置 dev-workspace 布局 (prefix + =) ---
bind = run-shell "$HOME/.config/dev-workspace/reset-layout.sh"

# --- 终端窗口缩放时自动锁定 dev-workspace 布局（非 5 面板 session 自动跳过）---
# NOTE: 使用 client-resized 而非 after-resize-pane，避免无限递归
# (reset-layout.sh 调用 resize-pane → 触发 after-resize-pane → 再次调用 → fork bomb)
set-hook -g client-resized "run-shell '$HOME/.config/dev-workspace/reset-layout.sh'"

# --- 重载配置 ---
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
